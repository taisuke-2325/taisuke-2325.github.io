<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ベネフィット・ステーション | マイクーポン</title>
    <meta
      name="description"
      content="LINEログイン風の導線から、マイクーポンを表示するLINEミニアプリデモです。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero__grid">
          <div class="hero__main">
            <div class="brand-lockup">
              <img
                class="brand-lockup__logo"
                src="https://corp.benefit-one.co.jp/files/img/common/logo.svg"
                alt="ベネフィット・ワン"
              />
              <div>
                <p class="hero__eyebrow">Benefit Station Mini App</p>
                <p class="brand-lockup__service">ベネフィット・ステーション</p>
              </div>
            </div>
            <h1>マイクーポン</h1>
            <div class="status-row">
              <span class="status-pill" id="line-status">LINE未確認</span>
              <span class="status-pill" id="member-status">会員未確認</span>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="app-page app-page--auth" id="auth-page">
          <section class="panel loading-panel hidden" id="loading-panel">
            <div class="spinner" aria-hidden="true"></div>
            <p id="loading-message">起動準備中です…</p>
          </section>

          <section class="panel auth-panel" id="line-login-panel">
            <div class="auth-panel__header">
              <h2>LINEログイン</h2>
              <p class="panel__subtext">
                LINEアカウントでログインすると、マイクーポンをご確認いただけます。
              </p>
            </div>

            <div class="login-form">
              <button class="primary-btn" id="line-login-button" type="button">
                LINEでログイン
              </button>
              <p class="auth-note">
                ボタン押下後、そのままクーポン一覧へ遷移します。
              </p>
            </div>
          </section>
        </section>

        <section class="app-page hidden" id="coupon-page">
          <div class="page-heading">
            <h2>マイクーポン</h2>
            <p class="page-heading__lead">
              LINEログイン済みのユーザーに対して、利用可能な優待・クーポンを一覧で表示します。
            </p>
          </div>

          <section class="panel profile-panel" id="profile-panel">
            <div>
              <p class="panel__label">利用者</p>
              <h2 id="display-name">LINEユーザー</h2>
              <p class="panel__subtext" id="display-meta">
                LINEログイン確認後に表示します
              </p>
            </div>
            <div class="panel__actions">
              <button class="secondary-btn" id="reset-demo-btn" type="button">
                ログイン情報をリセット
              </button>
            </div>
          </section>

          <section class="coupon-section" id="coupon-section">
            <div class="section-heading">
              <div>
                <p class="panel__label">My Coupons</p>
                <h2>あなた向けのクーポン</h2>
                <p class="section-heading__lead">
                  会員ランクと利用履歴をもとに、おすすめ優待をまとめて確認できます。
                </p>
              </div>
              <div class="coupon-summary">
                <span id="coupon-count">0件</span>
                <span>利用可能</span>
              </div>
            </div>

            <div class="coupon-grid" id="coupon-grid"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
